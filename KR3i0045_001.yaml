body:
  text: 師曠禽經師曠禽經子野曰鳥之屬三百六十鳳為之長故始於此鳳者羽族之長鳳雄凰雌凰鴻前麟後蛇首魚尾龍文龜身燕頷雞喙駢翼首載德頂揭義背負仁心抱忠翼挾信足履正小音鍾大音鼓不喙生草五采備舉飛則群鳥從出則王政平國有道亦曰瑞鶠景純注爾雅云瑞應鳥也雞頭蛇頸燕頤龜背魚尾五彩色高六尺許出為王者之嘉瑞孝經援神契曰王者德及鳥獸則鳳鳥翔亦曰鸑鷟鳳之小者若鸑鷟五彩之文三歲始備也羽族之君長也鸞瑞鳥鸞者鳳鳥之亞始生類鳳久則五彩變易故字從變省禮斗儀曰天下太平安寧則見其音如鈴巒巒然也周之文物大備法車之上綴以大鈴如鸞之聲也後改為鑾一曰雞趣顧野王符瑞圖曰雞趣王者有德則見首翼赤曰丹鳳青曰羽翔白曰化翼玄曰陰翥黃曰土符別五采而為名也鳳翥鸞舉百羽從之鸞鳳翔止百鳥皆從也以類化鳳靡鸞吪百鳥瘞之鳳死曰靡鸞死曰吪禽鳥啄土以瘞藏之慈烏反哺慈烏曰孝鳥長則反哺其母大觜烏否白脰烏不祥烏之白脰者西南人謂之鬼雀鳴則凶咎巨喙烏善警烏之巨觜者善避矰弋彈射曰善警哀烏吟夜烏之失雄雌則夜啼鷙鳥之善搏者曰鶚鶚大人見而悚愕也竊玄曰雕色淺黑而大者其羽蟲鳥毛也鴘曰鵔鷹色蒼黃謂之鴘廣雅曰鴘鷹二歲色也鷹生二歲如繫也骨曰鶻瞭曰鷂能遠視也瞭目明白音了𪄡曰鸇晨風也向風搖翅其回迅疾狀類雞色青搏燕雀食之左傳云若鷹鸇之逐鳥雀奪曰𨿷如鸇而小者其脰上下亦取鳥雀如攘奪也王鴡鴡鳩魚鷹也毛詩曰王雎摰而有別多子江表人呼以為魚鷹雌雄相愛不同居處詩之國風始關雎也亦曰白鷖鷖之色白者亦曰白鷢狀如鷹尾上白也雉介鳥也善搏鬭也亦曰鳩爾雅曰雉絶有力奮五采備曰翬爾雅曰伊洛而南素質五采皆備成章曰翬江淮而南青質五采皆備成章曰鷂言其毛色光輝也周禮后六服一曰翬衣取其雉性介而守以比后德也亦曰夏翟書曰羽畎夏翟雉尾至夏則光鮮也亦曰鷂雉青質五采解見上注朱黃曰鷩雉背毛黃腹毛赤頸毛緑而鮮明周禮鷩冕取此白曰雗雉江南呼曰白雉玄曰海雉羽色純黑亦善鬭生海中山島上首有彩毛曰山雞山雉長尾尤珍護之林木之森鬱者不入恐觸其尾也雨則避於巖石之下恐濡濕也久雨亦不出而求食死者甚衆頸有彩囊曰避株雉屬出華嶽及盛山中晴暘則頸出彩色作囊遇樹木則避之故曰避株任昉曰亦名吐綬鳥背有采羽曰翡翠狀如鵁鶄而色正碧鮮縟可愛飲啄於澄瀾洄淵之側尤惜其羽日濯於水中今王公之家以為婦人首飾其羽直千金腹有采文曰錦雞狀如鳩鴿膺前五色如孔雀羽出南詔越山中歲採捕之為王者冠服之飾鳲鳩戴勝布穀也揚雄曰鳲鳩戴勝生樹穴中不巢生爾雅曰鵖鴔戴鵀鵀即首上勝也頭上尾起故曰戴勝而農事方起此鳥飛鳴於桑間云五穀可布種也故曰布穀月令曰戴勝降于桑一名桑鳩仲春鷹所化也亦曰鴶鵴鳴自呼亦曰穫穀江東呼為穫穀見揚雄方言春耕候也云此鳥鳴時耕事方作農人以為候倉鶊黧黃黃鳥也今謂之黃鶯黃鸝是也野民曰黃栗留語聲囀耳其色黧黑而黃故名黧黃詩云黃鳥以色呼也亦曰楚雀北人呼為楚雀亦曰商庚夏蠶候也云此鳥鳴時蠶事方興蠶婦以為候對上文也雞鷽惡其類雞與山鵲惡其類相值則相搏鷽狀類鵲長尾丹觜鴛鴦玄鳥愛其類鴛鴦匹鳥也玄鳥燕也二鳥朝奇而暮偶愛其類也鳱以水言自北而南鳱音鴈隨陽鳥也冬適南方集于江干之上故字從干𩿪以山言自南而北𩿪亦音鴈中春寒盡鴈始北嚮燕代尚寒猶集于山陸岸谷之間故字從斥鶴以聲交而孕雄鳴上風雌承下風則孕鵲以音感而孕鵲乾鵲也上下飛鳴則孕白鷁相視而孕雄雌相視而孕鵁鶄睛交而孕狀類鳧而足高相視而睛不眩轉孕而生雛鸐嶲周子規也啼必北嚮爾雅曰嶲周甌越間曰怨鳥夜啼達旦血漬草木凡鳴皆北嚮也江介曰子規啼苦則倒懸於樹自呼曰謝豹蜀右曰杜宇望帝杜宇者蓋天精也李膺蜀志曰望帝稱王於蜀時荊州有一人化從井中出名曰鱉靈於楚身死尸反泝流上至汶山之陽忽復生乃見望帝立以為相其後巫山龍鬭壅江不流蜀民墊溺鱉靈乃鑿巫山開三峽降丘宅土民得陸居蜀人住江南羌住城北始立木柵周三十里令鱉靈為刺史號曰西州後數歲望帝以其功高禪位於鱉靈號曰開明氏望帝修道處西山而隱化為杜鵑鳥或云化為杜宇鳥亦曰子規鳥至春則啼聞者悽惻隨楊越雉鷓鴣也飛必南翥廣志云鷓鴣似雌雉飛但徂南不北也晉安曰懷南異物記云鷓鴣白黑成文其鳴自呼象小雉其志懷南不北徂也江左曰逐隱古今注曰南方有鳥名鷓鴣向南飛畏霜露早與暮出稀有時夜棲則以樹葉覆其背燕人亦不知有此鳥也鶡毅鳥也毅不知死狀類雞首有冠性敢于鬭死猶不置是不知死也左傳鶡冠武士戴之象其勇也鷗信鳥也信不知用鷗水鳥如鶬鶊而小隨潮而翔迎浪蔽日曰信鷗鷗之別類群鳴喈喈優優隨大小潮來也食小魚蝦𧍔之屬雖潮至則翔水嚮以為信反為鷙鳥所擊是知信而不知所以自害也鷸有文而貪鷸狀類燕紺色錯出有文色水際伺蚌出啄啄食之反為蚌所持死水中不知所食以為害左傳曰聚鷸為冠是也鳶不擊有貪鳶鴟也不善搏擊貪於攫肉也詩曰鳶飛戾天鮑昭曰寒鴟嚇雛鵜志在水鵜鶘水鳥也似鶚而大喙長尺餘頷下有胡如大囊受數外湖中取水以聚群魚候其竭涸奄取食之一名淘河詩曰維鵜在梁志在水也鴷志在木爾雅曰鴷斫木鳥巢木中觜如雞長數寸常斫樹食蠹蟲喙振木蟲皆動也鳩拙而安鳩鳲鳩也方言云蜀謂之拙鳥不善營巢取鳥巢居之雖拙而安處也雄呼晴雌鳴陰鷦巧而危鷦𪃐桃雀也狀類黃雀而小燕人謂之巧婦亦謂之女𪀘關東人呼曰巧雀亦謂之巧女喙尖取茅秀為巢刺以縑麻若紡績為巢或一房或二房懸於蒲葦之上枝折巢敗巧而不知所託鳧鶩之雜鳧鶩鴨屬色不純正故曰雜矣鷴鷺之潔鷴白鷴似山雞而色白行止間暇題鴂鳴而草衰爾雅謂之鵙鵙伯勞也狀類鶷鶡而大左傳謂之伯趙方言曰孤雞鳴則草衰澤雉啼而麥齊澤雉如商庚春季之月始鳴麥平隴也風翔則風風禽鳶類越人謂之風伯飛翔則天大風雨舞則雨一足鳥一名商羊字統曰商羊一名雨天將雨則飛鳴孔子辨之於齊庭也霜蜚則霜鷫鸘鳥名其羽可為裘以辟寒鷫鸘飛則隕霜露翥則露露禽鶴也古今注鶴千載變蒼又千載變黑所謂玄鶴也子野鼓琴玄鶴來舞露下則鶴鳴也鶴之馴養於家庭者飲露則飛去林鳥朝嘲林鳥朝之將翔也聚而噍啁水鳥夜㖡山鳥巖棲山巖之鳥多不巢原鳥地處𪇖鳥之屬是靈鵲兆喜鵲噪則喜生怪鵩塞耳一名休鶹廣雅曰江東呼為怪鳥聞之多禍人惡之掩塞耳矣鴽鶉野則義豢則搏月令曰田鼠化為鴽關東謂之鶉蜀隴謂之循在田得食鳴相呼夜則群飛晝則草伏馴養之久見食相搏鬭也水鶩澤則群擾則逐鶩野鴨也飛止大澤之中群處既豢擾之惡其族類而相逼逐也鸚鵡摩背而瘖鸚鵡出隴西能言鳥也人以手撫拭其背則瘖啞矣鴝鵒剔舌而語山海經謂之覩鵒今人育其雛以竹刀剔舌本教之言語謝尚能作鴝鵒舞之扶老強力古今注云扶老禿鶖也狀如鶴大者高七八尺善與人鬭好啖蛇脯羞食之益人氣力走及奔馬也鶺鴒友悌雀屬也爾雅曰鶺鴒雍渠毛詩曰水鳥也大雀高尺尖尾長啄頸黑青灰色腹下正白飛則鳴行則搖又曰鶺鴒在原兄弟急難鶺鴒共母者飛鳴不相離詩人取以喻兄弟相友之道也寀寮雍雍鴻儀鷺序鴻鴈屬大曰鴻小曰鴈飛有行列也鷺白鷺也小不踰大飛有次序百官縉紳之象詩以振鷺比百寮雍容喻朝美易曰鴻漸于干干盤聖人皆以鴻鷺之群擬官師也鷃雀啁啁下齊衆庶鷃籬鷃也雀屬衆人之象言多也鷯鶉雄鶛牝庳鷯雀也鶉也二鳥皆雄者足高雌者足短鳩鵽雌前雄後鳩鳲鳩也鵽大如鴿生關西為鳥憨急二鳥雌飛則隨雌止則止雌常在前也鷇將生子呼母應鳥伏卵將成子鳴于鷇母應之雛既生母呼子應鳥既雛母呼則子應之班鳩辨鵴班次序也凡哺子朝從上下暮從下上他鳥皆否梟鴟害母梟在巢母哺之羽翼成啄母目翔去也舒鴈鳴前後和舒鴈飛成行也雌前呼雄後應也群棲獨警夜棲川澤中千百為群有一鴈不瞑以警衆也覆卵則鸛入水鸛水鳥也伏卵時數入水冷則不毈取礜石周卵以助暖氣故方術家以鸛巢中礜石為真物也鵝𦞮月伏月卵則向月取其氣助卵也宵鳸司夜行鳸主晝雄翼掩左雌羽掩右爾雅曰鳥雌雄不可別者以翼右掩左雄左掩右雌物食長喙食物之生者皆長喙水鳥之屬也穀食短喙鳥食五穀者喙皆短搏則利觜鳥善搏鬭者利觜鳴則引吭善啼鳴頸長也毛協四時春則毛弱夏則稀少而改易秋則刷理冬則更生細毛自溫色合五方倉鷹之屬以象東方木行朱鳥之屬以象南方火行黃鳥之屬應土行以象季夏白鷺之屬以象西方金行玄鳥以象北方水行羽物變化轉於時令仲春之節鷹化為鳩季春之節田鼠化為鴽仲秋之節鳩復化為鷹季秋之節雀入大水化為蛤孟冬之節雉入水化為蜃淮南子曰鼇化為鶉鶉化為鸇鸇化為布穀布穀復為鷂順節令以變形也乾道始終以成物性生物者乾之始成物者乾之終隨時變化成就萬物之性也
