  text: 欽定四庫全書子部九
  hash: sha256:0bce925b640ea8fd115d42e34eba7e8dcf8661f4ed3df866ab1767c420beaed8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3i0045_WYG_000-1a, image: WYG0847/WYG0847-0677a.png}
body:
  text: 禽經譜録類三草木禽魚之屬提要臣等謹案禽經一巻舊本題師曠撰晉張華註漢隋唐諸志及宋崇文總目皆不著録其引用自陸佃埤雅始其稱師曠亦自佃始其稱張華註則見於左圭百川學海所刻考書中鷓鴣一條稱晉安曰懐南江右曰逐隠春秋時安有是地名其偽不待辨張華晉人而註引顧野王瑞應圖任昉述異記乃及見梁代之書則註之偽亦不待辨然其中又有偽中之偽考王楙野客叢書載埤雅諸書所引而楙時之本無之者如鶴以怨望鴟以貪顧雞以睨視鴨以怒視雀以猜懼燕以狂䀪鶯以喜囀烏以悲啼鳶以饑鳴鶴以潔淚梟以凶呌鴟以愁嘯鵝飛則蜮沈鵙鳴則蚓結鸛俯鳴則隂仰鳴則晴陸生之鳥咮多鋭而善啄水生之鳥咮多圓而善唼短脚者則伏長脚者多立凡數十條是楙所見者非北宋之本又楙書中辨鶯遷一條引禽經鶯鳴嚶嚶辨杜詩白鷗没浩蕩一條引禽經鳬善没鷗善浮辨葉夢得詞睡起啼鶯語一條引禽經啼鶯解語流鶯不解語今本又無之馬驌繹史全録此書而别取埤雅爾雅翼所引今本不載者附録於末謂之古禽經今考所載楙已稱禽經無其文者凡三條其餘尚有青鳯謂之鶡赤鳯謂之鶉黄鳯謂之肅紫鳯謂之鷟鶴愛隂而惡陽鴈愛陽而惡隂鶴老則聲下而不能髙近而不能尞旅旋目其名䴉方目其名􅱉交目其名鳽鳥之小而鷙者皆曰隼大而鷙者皆曰鳩烏鳴啞啞鸞鳴噰噰鳯鳴喈喈凰鳴啾啾雉鳴嘒嘒雞鳴咿咿鸎鳴嚶嚶鵲鳴唶唶鴨鳴呷呷鵠鳴哠哠鵙鳴嗅嗅郤近翠者皆步却近蒲者能擲朱鳶不攫肉朱鷺不吞鯹摯好風􅀈好雨鷞好霜鷺好露陸鳥曰棲水鳥曰宿獨鳥曰止衆鳥曰集鵞見異類差翅鳴雞見同類拊翼鳴鵻上無尋鷚上無常雉上有文鷃上有赤暮鳩鳴即小雨朝鳶鳴則大風鸇鸇之信不如鷹周周之智不如鴻淘河在岸則魚没沸河在岸則魚涌雕以周之鷲以就之鷹以膺之鶻以搰之隼以伊之鴻雁愛力遇風迅舉孔雀愛毛遇雨髙止雁曰翁雞曰􅀢鶉曰䳸鷹不擊伏鶻不擊姙一鳥曰佳二鳥曰雔三鳥曰朋四鳥曰乗五鳥曰􅂒六鳥曰鶂七鳥曰䲧八鳥曰鸞九鳥曰鳩十鳥曰􅝄拙者莫如鳩巧者莫如鶻鵲見蛇則噪而賁孔見蛇則宛而躍山禽之味多短水禽之味多長山禽之尾多修水禽之尾多促衡為雀虛為燕火為鷮亢為鶴鸛生三子一為鶴鳩生三子一為鶚鷹好峙隼好翔鳬好没鷗好浮乾車斷舌則坐歌孔雀拍尾則立舞人勝之也鸞入夜而歌鳯入朝而舞天勝之也霜傳強枝鳥以武生者少雪封枯原鳥以文死者多雀交不一雉交不再冠鳥性勇帶鳥性仁纓鳥性樂鴺鳥不登山鶮鳥不踏土諸條其中有兩條為楙所摘引餘亦不云無其文則今所見者又非楙所見之本矣觀雕以周之諸語全類字説疑即傳王氏學者所偽故陸佃取之此本為左圭百川學海所載則其偽當在南宋之末流傳已數百年文士往往引用姑存備考固亦無不可也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
